<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SelectionWay</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
/* ════════════════════════════════════════════════════════
   TOKENS
════════════════════════════════════════════════════════ */
:root{
  /* Surface */
  --bg:     #05040b;
  --s0:     #09070f;
  --s1:     #0f0d1a;
  --s2:     #171425;
  --s3:     #201d31;
  /* Accent */
  --a:      #f97316;
  --a10:    rgba(249,115,22,.10);
  --a20:    rgba(249,115,22,.20);
  --a40:    rgba(249,115,22,.40);
  /* Text */
  --t0:     #f0eeff;
  --t1:     #7a6ea8;
  --t2:     #3d3560;
  /* Chrome */
  --bdr:    rgba(255,255,255,.06);
  --bdr2:   rgba(255,255,255,.12);
  /* Semantic */
  --live:   #ff3c5a;
  --ok:     #23d18b;
  /* Radius */
  --rc:16px;--rb:10px;--rp:100px;
  /* Easing */
  --spring: cubic-bezier(.34,1.56,.64,1);
  --ease:   cubic-bezier(.22,.61,.36,1);
}

/* ════════════════════════════════════════════════════════
   RESET + BASE
════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overflow:hidden;height:100%}
body{
  font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;
  background:var(--bg);color:var(--t0);
  height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ════════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════════ */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:80;
  height:52px;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  background:rgba(5,4,11,.9);
  backdrop-filter:blur(24px) saturate(1.8);
  -webkit-backdrop-filter:blur(24px) saturate(1.8);
  border-bottom:1px solid var(--bdr);
}
#back{
  width:32px;height:32px;border-radius:50%;
  background:var(--s2);border:1px solid var(--bdr2);
  color:var(--t0);font-size:1.1rem;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .12s;
}
#back.show{opacity:1;pointer-events:all}
#back:active{transform:scale(.86)}

#brand{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
#brand-name{
  font-size:.98rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(90deg,#fff 40%,#c4b5fd 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
#brand-sub{
  font-size:.55rem;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;color:var(--a);margin-top:1px
}
#hdr-title{
  flex:1;min-width:0;font-size:.9rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:none
}
#hdr-badge{
  background:var(--a);color:#fff;
  font-size:.66rem;font-weight:800;
  padding:3px 11px;border-radius:var(--rp);
  display:none;white-space:nowrap;flex-shrink:0
}

/* ════════════════════════════════════════════════════════
   SEARCH + CAT BAR (home only)
════════════════════════════════════════════════════════ */
#topbar{
  position:fixed;top:52px;left:0;right:0;z-index:70;
  background:rgba(5,4,11,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  transition:transform .24s var(--ease),opacity .2s;
}
#topbar.off{transform:translateY(-100%);opacity:0;pointer-events:none}

.search-row{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px 7px;
}
.si{color:var(--t1);flex-shrink:0;width:16px}
#q{
  flex:1;background:none;border:none;outline:none;
  color:var(--t0);font-size:.86rem;caret-color:var(--a)
}
#q::placeholder{color:var(--t2)}
.chips{
  display:flex;gap:6px;padding:0 12px 9px;
  overflow-x:auto;scrollbar-width:none
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:5px 13px;border-radius:var(--rp);
  border:1px solid var(--bdr2);background:var(--s1);
  color:var(--t1);font-size:.72rem;font-weight:600;
  white-space:nowrap;cursor:pointer;
  transition:all .14s;
}
.chip:active{transform:scale(.92)}
.chip.on{color:#fff;border-color:transparent}

/* ════════════════════════════════════════════════════════
   PAGE SYSTEM
════════════════════════════════════════════════════════ */
.pg{
  position:fixed;top:52px;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  visibility:hidden;
  opacity:0;transform:translateX(44px);
  transition:transform .26s var(--ease),opacity .26s var(--ease),visibility 0s linear .26s;
  -webkit-overflow-scrolling:touch;
}
.pg.on{
  visibility:visible;opacity:1;transform:none;
  transition:transform .26s var(--ease),opacity .26s var(--ease),visibility 0s
}
.pg.back{transform:translateX(-24px)}

#pg-home{top:52px}

/* ════════════════════════════════════════════════════════
   SKELETON
════════════════════════════════════════════════════════ */
@keyframes shimmer{
  0%{background-position:-500px 0}
  100%{background-position:500px 0}
}
.sk{
  background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);
  background-size:500px 100%;
  animation:shimmer 1.3s infinite linear;
  border-radius:8px
}
.sk-card{margin-bottom:10px;border-radius:var(--rc);overflow:hidden}
.sk-img{width:100%;aspect-ratio:16/7;border-radius:0}
.sk-line{height:12px;margin:12px 14px 6px}
.sk-line.s{width:45%}
.sk-line.xs{height:9px;width:65%;margin-bottom:14px}

/* ════════════════════════════════════════════════════════
   BATCH CARDS  (image-first)
════════════════════════════════════════════════════════ */
#home-inner{padding-top:106px;padding-bottom:28px}/* topbar ≈54px */

.sec{
  display:flex;align-items:center;gap:8px;
  padding:16px 14px 9px;
  font-size:.64rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--t1)
}
.sec::after{content:'';flex:1;height:1px;background:var(--bdr)}

.grid{padding:0 11px}

@keyframes floatUp{
  from{opacity:0;transform:translateY(22px)}
  to{opacity:1;transform:none}
}

.card{
  position:relative;border-radius:var(--rc);overflow:hidden;
  background:var(--s1);border:1px solid var(--bdr);
  cursor:pointer;margin-bottom:10px;
  /* category stripe via box-shadow so it doesn't affect layout */
  box-shadow:inset 0 2.5px 0 var(--cc,#3d3560);
  animation:floatUp .42s var(--spring) both;
  transition:transform .14s var(--ease),box-shadow .14s;
}
.card:active{transform:scale(.971)}
.card.fv{border-color:rgba(249,115,22,.35)}

.cimg{
  position:relative;width:100%;aspect-ratio:16/7;
  background:var(--s2);overflow:hidden
}
.cimg img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
  opacity:0;transition:opacity .38s
}
.cimg img.rdy{opacity:1}
.cph{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;pointer-events:none
}
.cov{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    rgba(5,4,11,0) 0%,rgba(5,4,11,0) 28%,
    rgba(5,4,11,.65) 65%,rgba(5,4,11,.92) 100%)
}
.live-pip{
  position:absolute;top:10px;left:10px;z-index:2;
  background:var(--live);color:#fff;
  font-size:.6rem;font-weight:900;letter-spacing:.06em;
  padding:2px 8px;border-radius:4px;
  animation:lpulse 2s ease-in-out infinite
}
@keyframes lpulse{0%,100%{opacity:1}50%{opacity:.7}}

.fav{
  position:absolute;top:8px;right:8px;z-index:3;
  width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,.52);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;cursor:pointer;
  transition:transform .16s var(--spring),background .14s
}
.fav:active{transform:scale(.76)!important}
.fav.on{background:rgba(249,115,22,.25);border-color:rgba(249,115,22,.45)}

@keyframes pop{
  0%{transform:scale(1)}
  40%{transform:scale(1.5)}
  70%{transform:scale(.85)}
  100%{transform:scale(1)}
}
.fav.pop{animation:pop .36s var(--spring)}

.cbody{position:relative;z-index:2;padding:10px 13px 13px}
.ccat{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;
  padding:2px 9px;border-radius:var(--rp);margin-bottom:6px;
  background:rgba(255,255,255,.07);
  /* color set via inline style */
}
.ctitle{
  font-size:.9rem;font-weight:800;line-height:1.38;margin-bottom:5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.cmeta{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-size:.7rem;color:var(--t1)
}
.cmeta span{display:flex;align-items:center;gap:3px}

/* ════════════════════════════════════════════════════════
   BATCH DETAIL HERO
════════════════════════════════════════════════════════ */
.dhero{position:relative;overflow:hidden}
.dhbg{
  position:absolute;inset:-15px;z-index:0;
  background-size:cover;background-position:center;
  filter:blur(22px) brightness(.3) saturate(1.3);
  transform:scale(1.06)
}
.dhfg{position:relative;z-index:1;padding:18px 14px 16px}
.dthumb{
  width:100%;aspect-ratio:16/6.5;object-fit:cover;
  border-radius:12px;display:block;margin-bottom:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.65)
}
.dthumb-ph{
  width:100%;aspect-ratio:16/6.5;
  background:var(--s2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:3rem;
  margin-bottom:12px
}
.dcat{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.dtitle{font-size:1.08rem;font-weight:800;line-height:1.28;margin-bottom:10px}
.dchips{display:flex;gap:6px;flex-wrap:wrap}
.dchip{
  font-size:.7rem;color:var(--t1);
  background:rgba(255,255,255,.07);border:1px solid var(--bdr2);
  border-radius:var(--rp);padding:4px 12px;
  display:flex;align-items:center;gap:4px
}

/* ════════════════════════════════════════════════════════
   TOPIC CARDS
════════════════════════════════════════════════════════ */
.twrap{padding:2px 11px 80px}
.tcard{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--rb);padding:13px 13px;margin-bottom:8px;
  cursor:pointer;display:flex;align-items:center;gap:12px;
  border-left:3px solid var(--cc,var(--t2));
  transition:transform .13s var(--ease),border-color .14s,background .14s
}
.tcard:active{transform:scale(.974)}
.tcard:hover{background:var(--s2)}
.tico{
  width:44px;height:44px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  background:rgba(255,255,255,.06)
}
.ttext{flex:1;min-width:0}
.tname{font-size:.87rem;font-weight:700;line-height:1.3;margin-bottom:3px}
.tsub{font-size:.71rem;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcnt{
  font-size:.66rem;font-weight:800;
  padding:3px 10px;border-radius:var(--rp);
  background:rgba(255,255,255,.06);color:var(--t1);flex-shrink:0
}
.tarr{color:var(--t2);margin-left:2px;flex-shrink:0}

/* ════════════════════════════════════════════════════════
   LECTURE LIST
════════════════════════════════════════════════════════ */
.lvhero{
  padding:14px;background:var(--s1);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:13px
}
.lvico{
  width:52px;height:52px;border-radius:13px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.55rem;
  background:rgba(255,255,255,.06)
}
.lvinfo{flex:1;min-width:0}
.lvname{font-size:.98rem;font-weight:800;margin-bottom:3px;line-height:1.2}
.lvtch{font-size:.75rem;color:var(--t1)}
.lvbadge{
  font-size:.68rem;font-weight:800;color:#fff;
  background:var(--a);border-radius:var(--rp);
  padding:4px 12px;flex-shrink:0
}

.llist{padding:9px 11px 90px}
.lcard{
  background:var(--s1);border:1px solid var(--bdr);
  border-radius:var(--rb);padding:11px 13px;margin-bottom:8px;
  display:flex;align-items:center;gap:11px;
  cursor:pointer;transition:transform .12s,border-color .14s
}
.lcard.play:active{transform:scale(.975)}
.lcard.locked{opacity:.5;cursor:default}

.lnum{
  width:33px;height:33px;border-radius:8px;flex-shrink:0;
  background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--t1)
}
.lcard.play .lnum{background:var(--a10);color:var(--a)}

.ltext{flex:1;min-width:0}
.ltitle{
  font-size:.84rem;font-weight:600;line-height:1.38;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.lmeta{font-size:.69rem;color:var(--t1)}
.ltag{
  display:inline-block;background:rgba(255,60,90,.14);
  color:var(--live);font-size:.58rem;font-weight:800;
  border-radius:3px;padding:1px 5px;margin-right:4px;vertical-align:middle
}
.pbtn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:var(--a);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;
  box-shadow:0 4px 16px rgba(249,115,22,.4)
}

/* ════════════════════════════════════════════════════════
   VIDEO PLAYER
════════════════════════════════════════════════════════ */
#player{
  position:fixed;inset:0;z-index:200;
  background:rgba(2,1,8,.97);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .2s
}
#player.on{opacity:1;pointer-events:all}
.ptop{
  display:flex;align-items:center;gap:10px;padding:13px 15px;
  background:#030208;border-bottom:1px solid var(--bdr);flex-shrink:0
}
#pcls{
  background:var(--s2);border:1px solid var(--bdr2);
  color:var(--t0);border-radius:var(--rb);
  padding:7px 14px;font-size:.8rem;font-weight:600;
  cursor:pointer;flex-shrink:0;transition:background .14s
}
#pcls:active{background:var(--s3)}
#ptitle{flex:1;font-size:.84rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbody{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:14px;overflow-y:auto
}
#vwrap{
  width:100%;max-width:840px;background:#000;
  border-radius:12px;overflow:hidden;aspect-ratio:16/9;
  box-shadow:0 24px 72px rgba(0,0,0,.9)
}
#vwrap video,#vwrap iframe{width:100%;height:100%;border:0;display:block}
#pmsg{
  margin-top:13px;text-align:center;
  color:var(--t1);font-size:.8rem;line-height:1.65;max-width:360px
}
#pmsg a{color:var(--a)}

/* ════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════ */
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:60px 20px}
.spin{
  width:32px;height:32px;
  border:2.5px solid var(--bdr2);border-top-color:var(--a);
  border-radius:50%;animation:rot .7s linear infinite
}
@keyframes rot{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:52px 22px;color:var(--t1);line-height:1.8}
.empty em{display:block;font-size:2.6rem;margin-bottom:8px;font-style:normal}
.err{color:var(--live);font-size:.8rem;text-align:center;padding:24px}
</style>
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════ -->
<div id="hdr">
  <button id="back" onclick="navBack()">‹</button>
  <div id="brand">
    <div id="brand-name">SelectionWay</div>
    <div id="brand-sub">By Trms</div>
  </div>
  <div id="hdr-title"></div>
  <span id="hdr-badge"></span>
</div>

<!-- ══ TOPBAR (search + cats) ══════════════════════════ -->
<div id="topbar">
  <div class="search-row">
    <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.4-4.4"/>
    </svg>
    <input id="q" type="search" placeholder="Search courses, teachers…"
           oninput="filter(this.value)" autocomplete="off">
  </div>
  <div class="chips" id="chips">
    <div class="chip on" data-c="" onclick="selCat(this,'')">All</div>
  </div>
</div>

<!-- ══ HOME ════════════════════════════════════════════ -->
<div class="pg on" id="pg-home">
  <div id="home-inner">
    <div id="fav-sec"></div>
    <div id="batch-sec"><div id="blist"></div></div>
  </div>
</div>

<!-- ══ BATCH DETAIL ════════════════════════════════════ -->
<div class="pg" id="pg-batch">
  <div id="dhero-el"></div>
  <div class="twrap">
    <div class="sec" style="padding-left:3px">Topics &amp; Chapters</div>
    <div id="topic-list"></div>
  </div>
</div>

<!-- ══ LECTURE LIST ════════════════════════════════════ -->
<div class="pg" id="pg-topic">
  <div id="lv-hero"></div>
  <div class="llist" id="llist"></div>
</div>

<!-- ══ PLAYER ══════════════════════════════════════════ -->
<div id="player">
  <div class="ptop">
    <button id="pcls" onclick="closePlayer()">✕ Close</button>
    <span id="ptitle"></span>
  </div>
  <div class="pbody">
    <div id="vwrap"></div>
    <div id="pmsg"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════
   TELEGRAM
════════════════════════════════════════════════════════ */
if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand()}

/* ════════════════════════════════════════════════════════
   CATEGORY SYSTEM
════════════════════════════════════════════════════════ */
const CATS=[
  {k:['ssc','cgl','chsl','cpo'],       c:'#ff6b2b',i:'🚂'},
  {k:['railway','rrb','ntpc'],          c:'#ff6b2b',i:'🚂'},
  {k:['upsc','ias','civil'],            c:'#a855f7',i:'🏛️'},
  {k:['math','maths','quant'],          c:'#3b82f6',i:'📐'},
  {k:['english','grammar','vocab'],     c:'#10b981',i:'📝'},
  {k:['history','ancient','medieval'],  c:'#ef4444',i:'🏺'},
  {k:['polity','political','constit'],  c:'#6366f1',i:'⚖️'},
  {k:['geo','geography'],               c:'#06b6d4',i:'🌍'},
  {k:['economy','economics'],           c:'#22c55e',i:'📊'},
  {k:['science','physics','chem','bio'],c:'#c026d3',i:'🔬'},
  {k:['reasoning','logic','aptitude'],  c:'#f59e0b',i:'🧠'},
  {k:['hindi','language','literature'], c:'#ec4899',i:'📖'},
  {k:['gk','general','current','gs'],   c:'#14b8a6',i:'🌐'},
  {k:['selection','batch'],             c:'#f97316',i:'⭐'},
];
const DEFCAT={c:'#6b7a9d',i:'📚'};

const TICONS=['📖','📝','🎯','🏛️','🌍','⚖️','💡','🔬','📊','🗺️','⚡','🎓','🧠','📐','🌐','🏺','🚀','🔑'];

function catOf(str){
  const s=(str||'').toLowerCase();
  for(const e of CATS) if(e.k.some(k=>s.includes(k))) return e;
  return DEFCAT;
}

/* ════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════ */
let ALL=[],SHOWN=[],ACT_CAT='',CUR_BATCH=null,CUR_TOPIC=null,VIDS=[];
let hls=null;
let STACK=['home'];
let FAVS=JSON.parse(localStorage.getItem('sw_f')||'[]');

/* ════════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════════ */
const H=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isFav=id=>FAVS.includes(String(id));
const saveFavs=()=>localStorage.setItem('sw_f',JSON.stringify(FAVS));

function toggleFav(id,e){
  e&&e.stopPropagation();
  const btn=e&&e.currentTarget;
  if(btn){btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),400)}
  id=String(id);
  FAVS=isFav(id)?FAVS.filter(f=>f!==id):[...FAVS,id];
  saveFavs();
  renderBatches(SHOWN);
}

function skels(n){
  return Array.from({length:n},()=>`
  <div class="sk-card">
    <div class="sk sk-img"></div>
    <div class="sk sk-line" style="width:38%"></div>
    <div class="sk sk-line s"></div>
    <div class="sk sk-line xs"></div>
  </div>`).join('');
}

/* ════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════ */
function navTo(name){
  const cur=document.getElementById('pg-'+STACK[STACK.length-1]);
  const nxt=document.getElementById('pg-'+name);
  if(!nxt||nxt===cur)return;
  STACK.push(name);
  if(cur)cur.classList.remove('on');
  nxt.classList.remove('back');
  nxt.classList.add('on');
  nxt.scrollTop=0;
  syncHdr();
}
function navBack(){
  if(STACK.length<=1)return;
  const cur=document.getElementById('pg-'+STACK.pop());
  const prv=document.getElementById('pg-'+STACK[STACK.length-1]);
  if(cur){cur.classList.add('back');cur.classList.remove('on')}
  if(prv)prv.classList.add('on');
  syncHdr();
}
function syncHdr(){
  const cur=STACK[STACK.length-1];
  const home=cur==='home';
  document.getElementById('back').classList.toggle('show',!home);
  document.getElementById('brand').style.display=home?'':'none';
  const ht=document.getElementById('hdr-title');
  const hb=document.getElementById('hdr-badge');
  ht.style.display=home?'none':'';
  document.getElementById('topbar').classList.toggle('off',!home);
  if(cur==='batch'&&CUR_BATCH){
    ht.textContent=(CUR_BATCH.batch_meta||{}).title||'…';
    hb.style.display='none';
  }else if(cur==='topic'&&CUR_TOPIC){
    ht.textContent=CUR_TOPIC.name||'…';
    const n=(CUR_TOPIC.classes||[]).length;
    hb.textContent=n+' classes';hb.style.display=n?'':'none';
  }else{hb.style.display='none'}
}

/* ════════════════════════════════════════════════════════
   CAT CHIPS
════════════════════════════════════════════════════════ */
function buildChips(batches){
  const seen=new Set(),cats=[];
  batches.forEach(b=>{const c=(b.category||'').trim();if(c&&!seen.has(c)){seen.add(c);cats.push(c)}});
  const bar=document.getElementById('chips');
  bar.querySelectorAll('.chip:not([data-c=""])').forEach(e=>e.remove());
  cats.slice(0,14).forEach(cat=>{
    const st=catOf(cat);
    const el=document.createElement('div');
    el.className='chip';el.dataset.c=cat;
    el.innerHTML=st.i+' '+H(cat);
    el.onclick=()=>selCat(el,cat);
    bar.appendChild(el);
  });
}
function selCat(el,cat){
  document.querySelectorAll('.chip').forEach(c=>{
    c.classList.remove('on');c.style.background='';c.style.color='';
  });
  const st=catOf(cat);
  el.classList.add('on');
  if(cat){el.style.background=st.c;el.style.color=cat?'#fff':'';}
  ACT_CAT=cat;
  const q=document.getElementById('q').value.trim().toLowerCase();
  applyFilters(q,cat);
}

/* ════════════════════════════════════════════════════════
   LOAD
════════════════════════════════════════════════════════ */
async function loadBatches(){
  document.getElementById('blist').innerHTML=skels(5);
  try{
    const r=await fetch('/bot-api/batches');
    if(!r.ok)throw new Error('Server error '+r.status);
    ALL=await r.json();
    SHOWN=ALL;
    buildChips(ALL);
    renderBatches(ALL);
  }catch(err){
    document.getElementById('blist').innerHTML=
      `<div class="err">⚠️ ${H(err.message)}</div>`;
  }
}
function filter(q){applyFilters(q.trim().toLowerCase(),ACT_CAT)}
function applyFilters(q,cat){
  SHOWN=ALL.filter(b=>{
    const mc=!cat||(b.category||'').trim()===cat;
    const mq=!q||
      (b.title||'').toLowerCase().includes(q)||
      (b.faculty||'').toLowerCase().includes(q)||
      (b.category||'').toLowerCase().includes(q);
    return mc&&mq;
  });
  renderBatches(SHOWN);
}

/* ════════════════════════════════════════════════════════
   RENDER BATCHES
════════════════════════════════════════════════════════ */
function renderBatches(batches){
  const favs=batches.filter(b=>isFav(b.id));
  const rest=batches.filter(b=>!isFav(b.id));

  document.getElementById('fav-sec').innerHTML=favs.length
    ?`<div class="sec">⭐ Favourites</div><div class="grid">${favs.map((b,i)=>cardHtml(b,i)).join('')}</div>`
    :'';

  const label=favs.length?'<div class="sec">All Batches</div>':'';
  document.getElementById('blist').innerHTML=rest.length
    ?label+`<div class="grid">${rest.map((b,i)=>cardHtml(b,i+favs.length)).join('')}</div>`
    :(batches.length===0?'<div class="empty"><em>🔍</em>No batches match.</div>':'');

  // Load images
  document.querySelectorAll('img[data-s]').forEach(loadImg);
}

function loadImg(img){
  const src=img.dataset.s;if(!src)return;
  img.onload=()=>img.classList.add('rdy');
  img.onerror=()=>{
    // Direct URL blocked by browser CSP? Try via proxy
    if(!img.src.includes('/proxy-img')){
      img.src='/proxy-img?url='+encodeURIComponent(src);
    }else{
      img.style.display='none'; // Both failed — show emoji placeholder
    }
  };
  img.src=src;
  img.removeAttribute('data-s');
}

function cardHtml(b,idx){
  const st=catOf(b.category);
  const fv=isFav(b.id);
  const delay=Math.min(idx*50,320);
  return `
  <div class="card${fv?' fv':''}" style="--cc:${st.c};animation-delay:${delay}ms"
       onclick="openBatch('${H(b.id)}')">
    <div class="cimg">
      ${b.thumb?`<img data-s="${H(b.thumb)}" alt="" loading="lazy">`:''}
      <div class="cph">${st.i}</div>
      <div class="cov"></div>
      ${b.liveNow?'<div class="live-pip">🔴 LIVE</div>':''}
      <button class="fav${fv?' on':''}"
              onclick="toggleFav('${H(b.id)}',event)">${fv?'⭐':'🤍'}</button>
    </div>
    <div class="cbody">
      <div class="ccat" style="color:${st.c}">${st.i} ${H(b.category)}</div>
      <div class="ctitle">${H(b.title)}</div>
      <div class="cmeta">
        ${b.faculty?`<span>👨‍🏫 ${H(b.faculty)}</span>`:''}
        ${b.totalClass?`<span>🎥 ${b.totalClass}</span>`:''}
        ${b.price?`<span>💰 ₹${H(String(b.price))}</span>`:''}
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════════════
   OPEN BATCH
════════════════════════════════════════════════════════ */
async function openBatch(id){
  CUR_BATCH=null;VIDS=[];
  document.getElementById('dhero-el').innerHTML=
    '<div class="spin-wrap"><div class="spin"></div></div>';
  document.getElementById('topic-list').innerHTML='';
  navTo('batch');
  try{
    const r=await fetch(`/bot-api/batch/${encodeURIComponent(id)}/classes`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    CUR_BATCH=await r.json();
    VIDS=CUR_BATCH.video_links||[];
    renderBatch(CUR_BATCH);
  }catch(err){
    document.getElementById('dhero-el').innerHTML=
      `<div class="err">⚠️ ${H(err.message)}</div>`;
  }
}

function renderBatch(data){
  const meta=data.batch_meta||{};
  const st=catOf(meta.category);

  // Hero
  const bg=meta.thumb?`style="background-image:url('${H(meta.thumb)}')"` :'';
  document.getElementById('dhero-el').innerHTML=`
  <div class="dhero">
    <div class="dhbg" ${bg}></div>
    <div class="dhfg">
      ${meta.thumb
        ?`<img class="dthumb" src="${H(meta.thumb)}" alt=""
              onerror="this.outerHTML='<div class=dthumb-ph>${st.i}</div>'">`
        :`<div class="dthumb-ph">${st.i}</div>`}
      <div class="dcat" style="color:${st.c}">${st.i} ${H(meta.category)}</div>
      <div class="dtitle">${H(meta.title)}</div>
      <div class="dchips">
        ${meta.faculty  ?`<span class="dchip">👨‍🏫 ${H(meta.faculty)}</span>`:''}
        ${meta.price    ?`<span class="dchip">💰 ₹${H(String(meta.price))}</span>`:''}
        ${meta.validity ?`<span class="dchip">📅 ${H(String(meta.validity))}</span>`:''}
      </div>
    </div>
  </div>`;

  // Topics
  const topics=data.topics||[];
  if(!topics.length){
    document.getElementById('topic-list').innerHTML=
      '<div class="empty"><em>📭</em>No classes yet.</div>';
    syncHdr();return;
  }
  document.getElementById('topic-list').innerHTML=topics.map((t,i)=>{
    const ico=TICONS[i%TICONS.length];
    const cnt=(t.classes||[]).length;
    const sub=[t.teacher,cnt+(cnt===1?' class':' classes')].filter(Boolean).join(' · ');
    return `
    <div class="tcard" style="--cc:${st.c};animation:floatUp .38s var(--spring) ${Math.min(i*45,300)}ms both"
         onclick="openTopic(${i})">
      <div class="tico">${ico}</div>
      <div class="ttext">
        <div class="tname">${H(t.name)}</div>
        <div class="tsub">${H(sub)}</div>
      </div>
      <div class="tcnt">${cnt}</div>
      <div class="tarr">›</div>
    </div>`;
  }).join('');
  syncHdr();
}

/* ════════════════════════════════════════════════════════
   OPEN TOPIC
════════════════════════════════════════════════════════ */
function openTopic(idx){
  CUR_TOPIC=(CUR_BATCH&&CUR_BATCH.topics||[])[idx];
  if(!CUR_TOPIC)return;
  const meta=CUR_BATCH.batch_meta||{};
  const st=catOf(meta.category);
  const ico=TICONS[idx%TICONS.length];
  const cnt=(CUR_TOPIC.classes||[]).length;

  document.getElementById('lv-hero').innerHTML=`
  <div class="lvhero">
    <div class="lvico" style="background:${st.c}1a;color:${st.c}">${ico}</div>
    <div class="lvinfo">
      <div class="lvname">${H(CUR_TOPIC.name)}</div>
      ${CUR_TOPIC.teacher?`<div class="lvtch">👨‍🏫 ${H(CUR_TOPIC.teacher)}</div>`:''}
    </div>
    <div class="lvbadge">${cnt} ${cnt===1?'class':'classes'}</div>
  </div>`;

  const cls=CUR_TOPIC.classes||[];
  document.getElementById('llist').innerHTML=cls.length
    ?cls.map((c,i)=>{
      const vid=VIDS[c.video_index];
      const play=!!(vid&&vid.playable);
      const m=[c.duration_text,c.date_text].filter(Boolean).join(' · ');
      const lt=c.live?'<span class="ltag">LIVE</span>':'';
      return `
      <div class="lcard ${play?'play':'locked'}"
           ${play?`onclick="playVideo(${c.video_index})"`:''}>
        <div class="lnum">${String(i+1).padStart(2,'0')}</div>
        <div class="ltext">
          <div class="ltitle">${lt}${H(c.title)}</div>
          ${m?`<div class="lmeta">${H(m)}</div>`:''}
        </div>
        ${play?'<div class="pbtn">▶</div>':''}
      </div>`;
    }).join('')
    :'<div class="empty"><em>📭</em>No lectures yet.</div>';

  navTo('topic');
}

/* ════════════════════════════════════════════════════════
   PLAYER
════════════════════════════════════════════════════════ */
function playVideo(idx){
  const vid=VIDS[idx];
  if(!vid||!vid.playable)return;
  if(hls){hls.destroy();hls=null}
  document.getElementById('ptitle').textContent=vid.title||'';
  document.getElementById('pmsg').innerHTML='';
  document.getElementById('vwrap').innerHTML='';
  document.getElementById('player').classList.add('on');

  if(vid.video_type==='mp4')     _mp4(vid);
  else if(vid.video_type==='youtube') _yt(vid);
  else if(vid.video_type==='hls') _hls(vid);
}
function _mp4(vid){
  const urls=vid.mp4_urls||[];
  if(!urls.length){_pmsg('❌ No video URL found.',[]); return}
  const el=document.createElement('video');
  el.controls=true;el.playsInline=true;
  el.style.cssText='width:100%;height:100%;background:#000';
  document.getElementById('vwrap').appendChild(el);
  let qi=0,proxied=false;
  function try_(url){el.src=url;el.load();el.play().catch(()=>{})}
  el.addEventListener('error',function(){
    qi++;
    if(qi<urls.length){try_(urls[qi])}
    else if(!proxied){proxied=true;qi=0;try_('/proxy-video?url='+encodeURIComponent(urls[0]))}
    else{document.getElementById('vwrap').innerHTML='';_pmsg('❌ Cannot load video. Try opening directly:',urls)}
  });
  try_(urls[0]);
}
function _yt(vid){
  const m=(vid.url||'').match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  if(!m){_pmsg('❌ Bad YouTube URL.',[]);return}
  const f=document.createElement('iframe');
  f.src=`https://www.youtube.com/embed/${m[1]}?autoplay=1`;
  f.allow='accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;fullscreen';
  f.allowFullscreen=true;f.style.cssText='width:100%;height:100%;border:0';
  document.getElementById('vwrap').appendChild(f);
}
function _hls(vid){
  const v=document.createElement('video');
  v.controls=true;v.playsInline=true;
  v.style.cssText='width:100%;height:100%;background:#000';
  document.getElementById('vwrap').appendChild(v);
  const url=vid.url;
  if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=url;v.play().catch(()=>{});
  }else if(window.Hls&&Hls.isSupported()){
    hls=new Hls({debug:false});
    hls.loadSource(url);hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR,(_,d)=>{
      if(d.fatal){document.getElementById('vwrap').innerHTML='';_pmsg('❌ Stream failed.',[])}
    });
  }else{document.getElementById('vwrap').innerHTML='';_pmsg('❌ Browser cannot play this stream. Try Safari.',[]);}
}
function _pmsg(msg,urls){
  document.getElementById('pmsg').innerHTML=msg+
    (urls&&urls.length?'<br><br>'+urls.map(u=>`<a href="${H(u)}" target="_blank">↗ Open directly</a>`).join(' &ensp; '):'');
}
function closePlayer(){
  document.getElementById('player').classList.remove('on');
  document.getElementById('vwrap').innerHTML='';
  if(hls){hls.destroy();hls=null}
}
document.getElementById('player').addEventListener('click',e=>{
  if(e.target===e.currentTarget)closePlayer();
});

/* ════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════ */
loadBatches();
</script>
