<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SelectionWay Courses</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f1115);
    --bg2: var(--tg-theme-secondary-bg-color, #1a1d24);
    --text: var(--tg-theme-text-color, #f1f1f1);
    --hint: var(--tg-theme-hint-color, #8a93a3);
    --link: var(--tg-theme-link-color, #4dabf7);
    --btn: var(--tg-theme-button-color, #3b82f6);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --divider: rgba(255,255,255,0.08);
    --card-bg: rgba(255,255,255,0.04);
    --radius: 12px;
    --live: #ef4444;
    --success: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Top Bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--divider);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .back-btn {
    background: none; border: none; color: var(--link);
    font-size: 1rem; cursor: pointer; padding: 4px;
    display: flex; align-items: center; gap: 4px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .back-btn.visible { opacity: 1; pointer-events: all; }
  .topbar-title { flex: 1; font-size: 1rem; font-weight: 700; }
  .topbar-badge {
    font-size: 0.7rem; background: var(--btn); color: var(--btn-text);
    border-radius: 20px; padding: 2px 8px; font-weight: 700;
  }

  /* ── Search bar ── */
  .search-wrap { padding: 10px 16px; }
  .search-input {
    width: 100%; background: var(--bg2); border: 1px solid var(--divider);
    border-radius: var(--radius); padding: 9px 14px;
    color: var(--text); font-size: 0.9rem; outline: none;
  }
  .search-input::placeholder { color: var(--hint); }
  .search-input:focus { border-color: var(--btn); }

  /* ── Views ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── Batch list ── */
  .batch-list { padding: 0 16px 80px; }
  .batch-card {
    background: var(--card-bg);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px; margin-bottom: 10px;
    cursor: pointer; transition: transform 0.12s, background 0.12s;
    text-decoration: none; color: inherit;
  }
  .batch-card:active { transform: scale(0.98); background: var(--bg2); }
  .batch-thumb-wrap {
    width: 80px; height: 54px; border-radius: 8px; overflow: hidden;
    flex-shrink: 0; background: var(--bg2); position: relative;
  }
  .batch-thumb {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
  }
  .live-dot {
    position: absolute; top: 4px; right: 4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--live); box-shadow: 0 0 0 2px rgba(239,68,68,0.3);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 2px rgba(239,68,68,0.3); }
    50% { box-shadow: 0 0 0 5px rgba(239,68,68,0); }
  }
  .batch-info { flex: 1; min-width: 0; }
  .batch-cat {
    font-size: 0.68rem; font-weight: 700; color: var(--btn);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px;
  }
  .batch-title { font-size: 0.88rem; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
  .batch-desc { font-size: 0.75rem; color: var(--hint); line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .batch-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .chip {
    font-size: 0.68rem; color: var(--hint);
    background: var(--bg2); border-radius: 20px; padding: 2px 7px;
  }
  .chip.live { color: var(--live); border: 1px solid var(--live); }

  /* ── Batch detail header ── */
  .batch-hero {
    background: var(--bg2); border-bottom: 1px solid var(--divider);
    padding: 16px;
  }
  .hero-thumb {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    border-radius: var(--radius); margin-bottom: 12px; background: var(--card-bg);
    display: block;
  }
  .hero-cat { font-size: 0.7rem; font-weight: 700; color: var(--btn);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .hero-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 6px; }
  .hero-desc { font-size: 0.8rem; color: var(--hint); line-height: 1.5; margin-bottom: 10px; }
  .hero-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .hero-chip {
    font-size: 0.74rem; background: var(--card-bg); border: 1px solid var(--divider);
    border-radius: 20px; padding: 4px 10px; color: var(--hint);
  }

  /* ── Tabs ── */
  .tabs-bar {
    display: flex; border-bottom: 1px solid var(--divider);
    background: var(--bg); position: sticky; top: 49px; z-index: 40;
  }
  .tab-btn {
    flex: 1; background: none; border: none; color: var(--hint);
    font-size: 0.82rem; font-weight: 600; padding: 11px 4px;
    cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s;
  }
  .tab-btn.active { color: var(--btn); border-bottom-color: var(--btn); }
  .tab-panel { display: none; padding: 0 0 80px; }
  .tab-panel.active { display: block; }

  /* ── Topic accordion ── */
  .topic-group { border-bottom: 1px solid var(--divider); }
  .topic-header {
    width: 100%; display: flex; align-items: center; gap: 8px;
    background: none; border: none; color: var(--text);
    padding: 13px 16px; cursor: pointer; text-align: left;
  }
  .topic-name { font-weight: 700; font-size: 0.9rem; flex: 1; }
  .topic-teacher { font-size: 0.75rem; color: var(--hint); white-space: nowrap; }
  .topic-count { font-size: 0.72rem; color: var(--hint); white-space: nowrap; }
  .chevron { color: var(--hint); font-size: 1rem; transition: transform 0.18s; margin-left: 4px; }
  .topic-header.open .chevron { transform: rotate(90deg); }
  .topic-body { background: var(--bg2); }

  /* ── Lecture row ── */
  .lecture-row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px; border-bottom: 1px solid var(--divider);
    cursor: pointer; transition: background 0.1s;
  }
  .lecture-row:last-child { border-bottom: none; }
  .lecture-row:active { background: rgba(255,255,255,0.04); }
  .lecture-icon { font-size: 1.2rem; flex-shrink: 0; }
  .lecture-info { flex: 1; min-width: 0; }
  .lecture-title {
    font-size: 0.84rem; font-weight: 600; line-height: 1.35;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lecture-meta { font-size: 0.71rem; color: var(--hint); margin-top: 2px; }
  .live-badge { color: var(--live); font-weight: 700; }
  .play-icon { color: var(--btn); font-size: 1.1rem; flex-shrink: 0; }
  .no-video { color: var(--hint); font-size: 0.9rem; flex-shrink: 0; }

  /* ── PDF / Test lists ── */
  .resource-section { padding: 12px 16px; }
  .resource-section h4 {
    font-size: 0.78rem; color: var(--hint); font-weight: 700;
    text-transform: uppercase; letter-spacing: .05em; margin: 12px 0 6px;
  }
  .resource-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--divider);
  }
  .resource-item:last-child { border-bottom: none; }
  .resource-item a { color: var(--link); font-size: 0.83rem; text-decoration: none; flex: 1; }

  /* ── Player modal ── */
  #player-modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  #player-modal.open { opacity: 1; pointer-events: all; }
  .player-top {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; background: #0d0d0d;
    border-bottom: 1px solid var(--divider);
  }
  .player-close {
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; cursor: pointer;
    flex-shrink: 0;
  }
  #player-title {
    flex: 1; font-size: 0.88rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-quality { font-size: 0.72rem; color: var(--hint); white-space: nowrap; }
  .player-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px;
    overflow-y: auto;
  }
  #video-wrap {
    width: 100%; max-width: 900px;
    background: #000; border-radius: 10px; overflow: hidden;
    aspect-ratio: 16/9;
  }
  #video-wrap video, #video-wrap iframe {
    width: 100%; height: 100%; border: 0; display: block;
  }
  .player-status {
    margin-top: 12px; text-align: center; color: var(--hint);
    font-size: 0.82rem; max-width: 400px; line-height: 1.5;
  }
  .player-status a { color: var(--link); }
  .player-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
  .player-btn {
    background: var(--btn); color: var(--btn-text); border: none;
    border-radius: 8px; padding: 8px 16px; font-size: 0.82rem;
    font-weight: 700; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .player-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; }

  /* ── Loading / empty ── */
  .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 60px; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--divider);
    border-top-color: var(--btn); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state {
    text-align: center; padding: 60px 24px; color: var(--hint);
    font-size: 0.9rem; line-height: 1.7;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* Subtle entrance animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .batch-card { animation: fadeUp 0.25s ease both; }
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="topbar">
  <button class="back-btn" id="back-btn" onclick="goBack()">‹ Back</button>
  <span class="topbar-title" id="topbar-title">📚 SelectionWay</span>
  <span class="topbar-badge" id="topbar-badge" style="display:none"></span>
</div>

<!-- ── View: Batch List ── -->
<div class="view active" id="view-batches">
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="search"
           placeholder="Search batches…" oninput="filterBatches(this.value)">
  </div>
  <div class="batch-list" id="batch-list">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── View: Batch Detail ── -->
<div class="view" id="view-detail">
  <div id="batch-hero"></div>
  <div class="tabs-bar">
    <button class="tab-btn active" id="tab-btn-classes"  onclick="showTab('classes')">📚 Classes</button>
    <button class="tab-btn"        id="tab-btn-sheets"   onclick="showTab('sheets')">📄 Sheets</button>
    <button class="tab-btn"        id="tab-btn-tests"    onclick="showTab('tests')">📝 Tests</button>
  </div>
  <div class="tab-panel active" id="tab-classes"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  <div class="tab-panel"        id="tab-sheets"></div>
  <div class="tab-panel"        id="tab-tests"></div>
</div>

<!-- ── Player Modal ── -->
<div id="player-modal">
  <div class="player-top">
    <button class="player-close" onclick="closePlayer()">✕</button>
    <span id="player-title">Loading…</span>
    <span class="player-quality" id="player-quality"></span>
  </div>
  <div class="player-body">
    <div id="video-wrap"></div>
    <div class="player-status" id="player-status"></div>
    <div class="player-actions" id="player-actions"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// Telegram WebApp init
// ─────────────────────────────────────────────────────────────
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let allBatches = [];
let filteredBatches = [];
let currentBatch = null;
let currentVideos = [];
let hlsInstance = null;
let viewStack = ['batches'];

// ─────────────────────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const backBtn = document.getElementById('back-btn');
  if (viewStack.length > 1) {
    backBtn.classList.add('visible');
  } else {
    backBtn.classList.remove('visible');
  }
}

function goBack() {
  if (viewStack.length <= 1) return;
  viewStack.pop();
  const prev = viewStack[viewStack.length - 1];
  if (prev === 'batches') {
    document.getElementById('topbar-title').textContent = '📚 SelectionWay';
    document.getElementById('topbar-badge').style.display = 'none';
    document.getElementById('search-input').parentElement.style.display = '';
    showView('batches');
  }
  if (viewStack.length <= 1) {
    document.getElementById('back-btn').classList.remove('visible');
  }
}

// ─────────────────────────────────────────────────────────────
// Batches
// ─────────────────────────────────────────────────────────────
async function loadBatches() {
  try {
    const res = await fetch('/api/batches');
    if (!res.ok) throw new Error('API error ' + res.status);
    allBatches = await res.json();
    filteredBatches = allBatches;
    renderBatches(allBatches);

    // Check if URL hash requests a specific batch
    const hash = location.hash;
    const m = hash.match(/batch=([a-fA-F0-9]{16,32})/);
    if (m) openBatch(m[1], '');
  } catch (e) {
    document.getElementById('batch-list').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

function renderBatches(batches) {
  const list = document.getElementById('batch-list');
  if (!batches.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>No batches found.</div>';
    return;
  }
  list.innerHTML = batches.map((b, i) => {
    const thumb = b.thumb
      ? `<img class="batch-thumb" src="${esc(b.thumb)}" alt="" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="thumb-placeholder" ${b.thumb ? 'style="display:none"' : ''}>📚</div>`;
    const liveDot = b.liveNow ? '<div class="live-dot"></div>' : '';
    const liveChip = b.liveNow
      ? '<span class="chip live">🔴 LIVE</span>'
      : (b.isLive ? '<span class="chip">⏰ LIVE batch</span>' : '');
    const priceChip = b.price ? `<span class="chip">₹${esc(String(b.price))}</span>` : '';
    const classChip = b.totalClass ? `<span class="chip">🎥 ${b.totalClass}</span>` : '';

    return `<div class="batch-card" onclick="openBatch('${esc(b.id)}', '${esc(b.title).replace(/'/g,"&#39;")}')">
      <div class="batch-thumb-wrap">
        ${thumb}${placeholder}${liveDot}
      </div>
      <div class="batch-info">
        <div class="batch-cat">${esc(b.category)}</div>
        <div class="batch-title">${esc(b.title)}</div>
        <div class="batch-desc">${esc(b.short_desc)}</div>
        <div class="batch-chips">${liveChip}${priceChip}${classChip}</div>
      </div>
    </div>`;
  }).join('');
}

function filterBatches(q) {
  q = q.trim().toLowerCase();
  if (!q) {
    filteredBatches = allBatches;
  } else {
    filteredBatches = allBatches.filter(b =>
      (b.title || '').toLowerCase().includes(q) ||
      (b.category || '').toLowerCase().includes(q) ||
      (b.short_desc || '').toLowerCase().includes(q)
    );
  }
  renderBatches(filteredBatches);
}

// ─────────────────────────────────────────────────────────────
// Batch detail
// ─────────────────────────────────────────────────────────────
async function openBatch(batchId, title) {
  viewStack.push('detail');
  document.getElementById('topbar-title').textContent = title || 'Loading…';
  document.getElementById('topbar-badge').style.display = 'none';
  document.getElementById('search-input').parentElement.style.display = 'none';
  document.getElementById('back-btn').classList.add('visible');

  // Reset tabs
  showTab('classes');
  document.getElementById('tab-classes').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  document.getElementById('tab-sheets').innerHTML = '';
  document.getElementById('tab-tests').innerHTML = '';
  document.getElementById('batch-hero').innerHTML = '';
  showView('detail');

  try {
    const res = await fetch(`/api/batch/${encodeURIComponent(batchId)}/classes`);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();

    currentBatch = data;
    currentVideos = data.video_links || [];

    // Update topbar
    const title2 = (data.batch_meta || {}).title || title;
    document.getElementById('topbar-title').textContent = title2;
    const badge = currentVideos.length;
    if (badge) {
      document.getElementById('topbar-badge').textContent = badge + ' classes';
      document.getElementById('topbar-badge').style.display = '';
    }

    renderHero(data.batch_meta);
    renderClassesTab(data.topics);
    renderSheetsTab(data.pdf_links || []);
    renderTestsTab(data.test_links || []);
  } catch (e) {
    document.getElementById('tab-classes').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

function renderHero(meta) {
  if (!meta) return;
  const thumb = meta.thumb
    ? `<img class="hero-thumb" src="${esc(meta.thumb)}" alt=""
          onerror="this.style.display='none'">`
    : '';
  const chips = [
    meta.price ? `<span class="hero-chip">💰 ₹${esc(String(meta.price))}</span>` : '',
    meta.validity ? `<span class="hero-chip">📅 ${esc(String(meta.validity))}</span>` : '',
    meta.faculty ? `<span class="hero-chip">👨‍🏫 ${esc(meta.faculty)}</span>` : '',
  ].filter(Boolean).join('');

  document.getElementById('batch-hero').innerHTML = `
    <div class="batch-hero">
      ${thumb}
      <div class="hero-cat">${esc(meta.category)}</div>
      <div class="hero-title">${esc(meta.title)}</div>
      ${meta.short_desc ? `<div class="hero-desc">${esc(meta.short_desc)}</div>` : ''}
      ${chips ? `<div class="hero-chips">${chips}</div>` : ''}
    </div>
  `;
}

function renderClassesTab(topics) {
  if (!topics || !topics.length) {
    document.getElementById('tab-classes').innerHTML =
      '<div class="empty-state"><div class="icon">📭</div>No classes yet.</div>';
    return;
  }

  const html = topics.map((topic, ti) => {
    const rows = topic.classes.map(cls => {
      const video = currentVideos[cls.video_index];
      const icon  = video && video.video_type === 'mp4' ? '🎬'
                  : video && video.video_type === 'youtube' ? '▶️'
                  : video && video.video_type === 'hls' ? '📡'
                  : '📖';
      const liveB = cls.live ? '<span class="live-badge">🔴 LIVE</span> ' : '';
      const meta  = [cls.duration_text, cls.date_text].filter(Boolean).join(' · ');
      const playable = video && video.playable;
      const actionIcon = playable ? '<span class="play-icon">▶</span>' : '<span class="no-video">—</span>';

      return `<div class="lecture-row" ${playable ? `onclick="playVideo(${cls.video_index})"` : ''}>
        <span class="lecture-icon">${icon}</span>
        <div class="lecture-info">
          <div class="lecture-title">${liveB}${esc(cls.title)}</div>
          ${meta ? `<div class="lecture-meta">${esc(meta)}</div>` : ''}
        </div>
        ${actionIcon}
      </div>`;
    }).join('');

    const isFirst = ti === 0;
    return `<div class="topic-group">
      <button class="topic-header ${isFirst ? 'open' : ''}" onclick="toggleTopic(this)">
        <span class="topic-name">${esc(topic.name)}</span>
        ${topic.teacher ? `<span class="topic-teacher">${esc(topic.teacher)}</span>` : ''}
        <span class="topic-count">${topic.classes.length} classes</span>
        <span class="chevron">›</span>
      </button>
      <div class="topic-body" ${isFirst ? '' : 'hidden'}>
        ${rows}
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-classes').innerHTML = html;
}

function renderSheetsTab(pdfs) {
  if (!pdfs.length) {
    document.getElementById('tab-sheets').innerHTML =
      '<div class="empty-state"><div class="icon">📭</div>No sheets yet.</div>';
    return;
  }
  const byTopic = {};
  pdfs.forEach(p => {
    const t = p.topic || 'General';
    (byTopic[t] = byTopic[t] || []).push(p);
  });
  const html = Object.entries(byTopic).map(([topic, items]) =>
    `<div class="resource-section">
      <h4>${esc(topic)}</h4>
      ${items.map(p => `<div class="resource-item">
        <a href="${esc(p.url)}" target="_blank" rel="noopener">📄 ${esc(p.name)}</a>
      </div>`).join('')}
    </div>`
  ).join('');
  document.getElementById('tab-sheets').innerHTML = html;
}

function renderTestsTab(tests) {
  if (!tests.length) {
    document.getElementById('tab-tests').innerHTML =
      '<div class="empty-state"><div class="icon">📭</div>No tests yet.</div>';
    return;
  }
  const byTopic = {};
  tests.forEach(t => {
    const tp = t.topic || 'General';
    (byTopic[tp] = byTopic[tp] || []).push(t);
  });
  const html = Object.entries(byTopic).map(([topic, items]) =>
    `<div class="resource-section">
      <h4>${esc(topic)}</h4>
      ${items.map(t => `<div class="resource-item">
        ${t.url ? `<a href="${esc(t.url)}" target="_blank" rel="noopener">📝 ${esc(t.name)}</a>`
                : `<span style="color:var(--hint)">📝 ${esc(t.name)}</span>`}
      </div>`).join('')}
    </div>`
  ).join('');
  document.getElementById('tab-tests').innerHTML = html;
}

function showTab(name) {
  ['classes', 'sheets', 'tests'].forEach(t => {
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
}

function toggleTopic(btn) {
  const body = btn.nextElementSibling;
  const hidden = body.hasAttribute('hidden');
  if (hidden) { body.removeAttribute('hidden'); btn.classList.add('open'); }
  else         { body.setAttribute('hidden', ''); btn.classList.remove('open'); }
}

// ─────────────────────────────────────────────────────────────
// Video Player
// ─────────────────────────────────────────────────────────────
function playVideo(idx) {
  const video = currentVideos[idx];
  if (!video || !video.playable) return;

  // Clean up any existing HLS instance
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  document.getElementById('player-title').textContent   = video.title;
  document.getElementById('player-quality').textContent = video.quality || '';
  document.getElementById('player-status').innerHTML    = '';
  document.getElementById('player-actions').innerHTML   = '';

  const wrap = document.getElementById('video-wrap');
  wrap.innerHTML = '';

  const modal = document.getElementById('player-modal');
  modal.classList.add('open');

  if (video.video_type === 'mp4') {
    playMp4(video, wrap);
  } else if (video.video_type === 'youtube') {
    playYouTube(video, wrap);
  } else if (video.video_type === 'hls') {
    playHLS(video, wrap);
  }
}

function playMp4(video, wrap) {
  const urls    = video.mp4_urls || [];
  if (!urls.length) {
    setStatus('❌ No video URL available.', urls);
    return;
  }

  const el = document.createElement('video');
  el.controls     = true;
  el.playsInline  = true;
  el.style.width  = '100%';
  el.style.height = '100%';
  el.style.background = '#000';
  wrap.appendChild(el);

  let qIdx = 0;
  let usedProxy = false;

  function tryLoad(url) {
    el.src = url;
    el.load();
    el.play().catch(() => {});
  }

  function nextUrl() {
    qIdx++;
    if (qIdx < urls.length) {
      setStatusMsg(`⟳ Trying lower quality…`);
      tryLoad(urls[qIdx]);
    } else if (!usedProxy) {
      // Try proxying the first URL through our server
      usedProxy = true;
      qIdx = 0;
      setStatusMsg('⟳ Retrying via proxy…');
      tryLoad('/proxy-video?url=' + encodeURIComponent(urls[0]));
    } else {
      wrap.innerHTML = '';
      setStatus('❌ Video could not be loaded. Try opening directly:', urls);
    }
  }

  el.addEventListener('error', nextUrl);
  tryLoad(urls[0]);
}

function playYouTube(video, wrap) {
  const m = (video.url || '').match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  const ytId = m ? m[1] : '';
  if (!ytId) { setStatus('❌ Could not extract YouTube ID.', []); return; }
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=1`;
  iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
  iframe.allowFullscreen = true;
  iframe.style.width = '100%';
  iframe.style.height = '100%';
  iframe.style.border = '0';
  wrap.appendChild(iframe);
}

function playHLS(video, wrap) {
  const url = video.url; // already proxied on server side
  const v   = document.createElement('video');
  v.controls    = true;
  v.playsInline = true;
  v.style.width  = '100%';
  v.style.height = '100%';
  v.style.background = '#000';
  wrap.appendChild(v);

  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    v.src = url;
    v.play().catch(() => {});
  } else if (window.Hls && Hls.isSupported()) {
    hlsInstance = new Hls({ debug: false });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(v);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
    hlsInstance.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        wrap.innerHTML = '';
        setStatus('❌ Stream could not be loaded.', video.raw_url ? [video.raw_url] : []);
      }
    });
  } else {
    wrap.innerHTML = '';
    setStatus('❌ Your browser cannot play this stream. Try Safari.', []);
  }
}

function setStatusMsg(msg) {
  document.getElementById('player-status').textContent = msg;
}

function setStatus(msg, urls) {
  document.getElementById('player-status').innerHTML = msg +
    (urls && urls.length ? '<br>' + urls.map(u =>
      `<a href="${esc(u)}" target="_blank">↗ Open directly</a>`
    ).join('  ') : '');
}

function closePlayer() {
  const modal = document.getElementById('player-modal');
  modal.classList.remove('open');
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  document.getElementById('video-wrap').innerHTML = '';
}

// Close on backdrop click
document.getElementById('player-modal').addEventListener('click', function(e) {
  if (e.target === this || e.target === this.querySelector('.player-body')) closePlayer();
});

// ─────────────────────────────────────────────────────────────
// Utils
// ─────────────────────────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
