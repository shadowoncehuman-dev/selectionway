<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal — SelectionWay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --border: #30363d;
    --text: #e6edf3; --hint: #8b949e; --link: #58a6ff;
    --btn: #3b82f6; --danger: #ef4444; --success: #22c55e;
    --radius: 10px;
  }
  body { font-family: -apple-system,'Segoe UI',Roboto,Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Top nav ── */
  nav {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .nav-logo { font-size: 1.1rem; font-weight: 800; }
  .nav-spacer { flex: 1; }
  .nav-link { color: var(--hint); font-size: 0.85rem; text-decoration: none; cursor: pointer; }
  .nav-link:hover { color: var(--text); }

  /* ── Layout ── */
  main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
  h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

  /* ── Stats grid ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 18px;
  }
  .stat-label { font-size: 0.78rem; color: var(--hint); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .stat-value { font-size: 2rem; font-weight: 800; }

  /* ── Card ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; }
  .card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .card-title { font-size: 0.95rem; font-weight: 700; flex: 1; }
  .card-body { padding: 0; }

  /* ── Table ── */
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  thead th {
    text-align: left; padding: 10px 16px;
    color: var(--hint); font-size: 0.74rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  td { padding: 10px 16px; vertical-align: middle; }
  .badge {
    display: inline-block; border-radius: 20px; padding: 2px 9px;
    font-size: 0.71rem; font-weight: 700;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--success); }
  .badge-red   { background: rgba(239,68,68,0.15);  color: var(--danger); }
  .badge-blue  { background: rgba(59,130,246,0.15); color: var(--link); }
  .badge-gray  { background: rgba(255,255,255,0.08); color: var(--hint); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    border: none; border-radius: 7px; padding: 6px 13px;
    font-size: 0.78rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s; text-decoration: none;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary  { background: var(--btn); color: #fff; }
  .btn-danger   { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
  .btn-success  { background: rgba(34,197,94,0.15);  color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
  .btn-ghost    { background: rgba(255,255,255,0.06); color: var(--text); }

  /* ── Pagination ── */
  .pagination { display: flex; align-items: center; gap: 8px; padding: 14px 16px; }
  .page-info { color: var(--hint); font-size: 0.83rem; flex: 1; }

  /* ── User detail panel ── */
  #user-panel {
    position: fixed; top: 0; right: -100%; width: 380px; height: 100vh;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 200; transition: right 0.25s ease;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #user-panel.open { right: 0; }
  .panel-head {
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .panel-close { background: none; border: none; color: var(--hint); font-size: 1.2rem; cursor: pointer; }
  .panel-title { flex: 1; font-size: 0.95rem; font-weight: 700; }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; }
  .panel-row { margin-bottom: 16px; }
  .panel-label { font-size: 0.74rem; color: var(--hint); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .panel-val { font-size: 0.92rem; }
  .panel-actions { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 20px; border-top: 1px solid var(--border); }
  .history-item { font-size: 0.82rem; padding: 7px 0; border-bottom: 1px solid var(--border); color: var(--hint); }
  .history-item:last-child { border-bottom: none; }
  .history-name { color: var(--text); }

  /* ── Limit modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 380px; }
  .modal h3 { font-size: 1rem; margin-bottom: 16px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 0.8rem; color: var(--hint); margin-bottom: 6px; }
  .form-row input, .form-row select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 12px; color: var(--text); font-size: 0.9rem; outline: none;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--btn); }
  .modal-btns { display: flex; gap: 8px; margin-top: 6px; }
  .modal-btns .btn { flex: 1; justify-content: center; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1f2937; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 20px; font-size: 0.85rem; z-index: 500;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  .mono { font-family: monospace; font-size: 0.85rem; }
  .muted { color: var(--hint); }
</style>
</head>
<body>

<nav>
  <span class="nav-logo">🛡 Admin Portal</span>
  <span class="nav-spacer"></span>
  <a class="nav-link" href="/" target="_blank">Mini App ↗</a>
  <a class="nav-link" href="/admin/logout" style="color:var(--danger)">Logout</a>
</nav>

<main>
  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="s-total">{{ stats.total }}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Banned</div>
      <div class="stat-value" style="color:var(--danger)" id="s-banned">{{ stats.banned }}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Fetches</div>
      <div class="stat-value" id="s-fetches">{{ stats.fetches }}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today's Fetches</div>
      <div class="stat-value" style="color:var(--success)" id="s-today">{{ stats.today }}</div>
    </div>
  </div>

  <!-- Users -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">👥 Users</span>
      <span id="users-info" class="muted" style="font-size:0.82rem"></span>
      <button class="btn btn-ghost" onclick="refreshStats()">↻ Refresh</button>
    </div>
    <div class="card-body">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>ID</th>
            <th>Status</th>
            <th>Limit</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--hint)">Loading…</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <span class="page-info" id="page-info">—</span>
        <button class="btn btn-ghost" id="btn-prev" onclick="changePage(-1)" disabled>◀ Prev</button>
        <button class="btn btn-ghost" id="btn-next" onclick="changePage(1)" disabled>Next ▶</button>
      </div>
    </div>
  </div>
</main>

<!-- User detail panel -->
<div id="user-panel">
  <div class="panel-head">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <span class="panel-title">User Profile</span>
  </div>
  <div class="panel-body" id="panel-body">
    <div style="text-align:center;padding:40px;color:var(--hint)">Loading…</div>
  </div>
  <div class="panel-actions" id="panel-actions"></div>
</div>

<!-- Limit modal -->
<div class="overlay" id="limit-modal">
  <div class="modal">
    <h3>⚙️ Set Fetch Limit</h3>
    <div class="form-row">
      <label>Count (0 = unlimited)</label>
      <input type="number" id="limit-count" min="0" value="1">
    </div>
    <div class="form-row">
      <label>Period</label>
      <select id="limit-period">
        <option value="day">Per Day</option>
        <option value="week">Per Week</option>
        <option value="month">Per Month</option>
        <option value="unlimited">Unlimited</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeLimit()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLimit()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let currentPage = 0;
let totalUsers  = 0;
const PAGE_SIZE = 10;
let currentUid  = null;

// ── Stats refresh ──
async function refreshStats() {
  try {
    const r = await fetch('/bot-api/admin/stats');
    const s = await r.json();
    document.getElementById('s-total').textContent   = s.total;
    document.getElementById('s-banned').textContent  = s.banned;
    document.getElementById('s-fetches').textContent = s.fetches;
    document.getElementById('s-today').textContent   = s.today;
  } catch(e) {}
}

// ── Users list ──
async function loadUsers(page) {
  currentPage = page;
  document.getElementById('users-tbody').innerHTML =
    '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--hint)">Loading…</td></tr>';
  const r = await fetch(`/bot-api/admin/users?page=${page}`);
  const data = await r.json();
  totalUsers = data.total;

  const tbody = document.getElementById('users-tbody');
  if (!data.users.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--hint)">No users yet.</td></tr>';
    return;
  }

  tbody.innerHTML = data.users.map(u => {
    const name  = u.first_name || u.username || '—';
    const uname = u.username ? `@${u.username}` : '';
    const badge = u.is_banned
      ? '<span class="badge badge-red">🚫 Banned</span>'
      : u.is_admin
        ? '<span class="badge badge-blue">👑 Admin</span>'
        : '<span class="badge badge-green">✅ Active</span>';
    return `<tr>
      <td>
        <div style="font-weight:600;font-size:0.86rem">${esc(name)}</div>
        ${uname ? `<div class="muted" style="font-size:0.74rem">${esc(uname)}</div>` : ''}
      </td>
      <td class="mono">${u.user_id}</td>
      <td>${badge}</td>
      <td class="muted">${esc(u.limit_str)}</td>
      <td class="muted">${esc(u.joined_at)}</td>
      <td><button class="btn btn-ghost" onclick="openUserPanel(${u.user_id})">View</button></td>
    </tr>`;
  }).join('');

  const start = page * PAGE_SIZE + 1;
  const end   = Math.min(start + data.users.length - 1, totalUsers);
  document.getElementById('page-info').textContent = `${start}–${end} of ${totalUsers}`;
  document.getElementById('users-info').textContent = totalUsers + ' users';
  document.getElementById('btn-prev').disabled = page === 0;
  document.getElementById('btn-next').disabled = end >= totalUsers;
}

function changePage(delta) {
  loadUsers(currentPage + delta);
}

// ── User panel ──
async function openUserPanel(uid) {
  currentUid = uid;
  document.getElementById('user-panel').classList.add('open');
  document.getElementById('panel-body').innerHTML = '<div style="text-align:center;padding:40px;color:var(--hint)">Loading…</div>';
  document.getElementById('panel-actions').innerHTML = '';

  const r = await fetch(`/bot-api/admin/user/${uid}`);
  if (!r.ok) { showToast('User not found'); return; }
  const u = await r.json();

  const periodLabel = {day:'per day',week:'per week',month:'per month',unlimited:'unlimited'}[u.fetch_period] || u.fetch_period;
  const histHtml = u.history.length
    ? u.history.map(h => `<div class="history-item"><span class="history-name">${esc(h.batch_name)}</span> <span class="muted">— ${esc(h.fetched_at)}</span></div>`).join('')
    : '<div class="history-item muted">No fetches yet.</div>';

  document.getElementById('panel-body').innerHTML = `
    <div class="panel-row">
      <div class="panel-label">Name</div>
      <div class="panel-val">${esc(u.first_name || '—')}${u.username ? ` <span class="muted">@${esc(u.username)}</span>` : ''}</div>
    </div>
    <div class="panel-row">
      <div class="panel-label">Telegram ID</div>
      <div class="panel-val mono">${u.user_id}</div>
    </div>
    <div class="panel-row">
      <div class="panel-label">Status</div>
      <div class="panel-val">
        ${u.is_banned ? '<span class="badge badge-red">🚫 Banned</span>' : '<span class="badge badge-green">✅ Active</span>'}
        ${u.is_admin ? ' <span class="badge badge-blue">👑 Admin</span>' : ''}
      </div>
    </div>
    <div class="panel-row">
      <div class="panel-label">Fetch Limit</div>
      <div class="panel-val">${u.fetch_limit} ${periodLabel}</div>
    </div>
    <div class="panel-row">
      <div class="panel-label">Joined</div>
      <div class="panel-val muted">${esc(u.joined_at)}</div>
    </div>
    <div class="panel-row" style="margin-top:20px">
      <div class="panel-label">📦 Fetch History</div>
      <div style="margin-top:6px">${histHtml}</div>
    </div>
  `;

  const banBtn = u.is_banned
    ? `<button class="btn btn-success" onclick="setBan(${uid}, false)">✅ Unban</button>`
    : `<button class="btn btn-danger"  onclick="setBan(${uid}, true)">🚫 Ban</button>`;

  document.getElementById('panel-actions').innerHTML = `
    ${banBtn}
    <button class="btn btn-ghost" onclick="openLimit()">⚙️ Set Limit</button>
  `;
}

function closePanel() {
  document.getElementById('user-panel').classList.remove('open');
  currentUid = null;
}

// ── Ban/Unban ──
async function setBan(uid, banned) {
  const r = await fetch('/bot-api/admin/ban', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user_id: uid, banned}),
  });
  if (r.ok) {
    showToast(banned ? '🚫 User banned' : '✅ User unbanned');
    await openUserPanel(uid);
    await loadUsers(currentPage);
    await refreshStats();
  }
}

// ── Set limit ──
function openLimit() {
  document.getElementById('limit-modal').classList.add('open');
}
function closeLimit() {
  document.getElementById('limit-modal').classList.remove('open');
}
async function saveLimit() {
  const count  = parseInt(document.getElementById('limit-count').value) || 0;
  const period = document.getElementById('limit-period').value;
  const r = await fetch('/bot-api/admin/limit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user_id: currentUid, limit: count, period}),
  });
  if (r.ok) {
    closeLimit();
    showToast('⚙️ Limit updated');
    await openUserPanel(currentUid);
  }
}

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close panel when clicking outside on mobile
document.addEventListener('click', function(e) {
  const panel = document.getElementById('user-panel');
  if (panel.classList.contains('open') && !panel.contains(e.target)) {
    const rows = document.querySelectorAll('.btn-ghost[onclick^="openUserPanel"]');
    let clickedRow = false;
    rows.forEach(r => { if (r.contains(e.target)) clickedRow = true; });
    if (!clickedRow) closePanel();
  }
});

// ── Init ──
loadUsers(0);
setInterval(refreshStats, 30000);
</script>
</body>
</html>
